name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Show scripts (debug)
        run: cat package.json

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Start your app in background (so we can see logs if it fails)
      - name: Start web server (debug)
        run: |
          npm run dev -- --host 0.0.0.0 --port 3000 > server.log 2>&1 &
          sleep 2
          echo "Server started (maybe). Last 50 lines:"
          tail -n 50 server.log || true

      # Wait until the server is actually reachable
      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:3000 >/dev/null; then
              echo "Server is up!"
              exit 0
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done
          echo "Server did not start. Server log:"
          tail -n 200 server.log || true
          exit 1

      - name: Run Playwright tests
        run: npx playwright test
        env:
          DEBUG: pw:webserver

      - name: Upload server log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/